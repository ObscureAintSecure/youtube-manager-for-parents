name: Process approved channel suggestion

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

# Serialize runs - two approvals at once otherwise race on the push
concurrency:
  group: process-suggestion
  cancel-in-progress: false

jobs:
  add-channels:
    if: github.event.label.name == 'approved' && startsWith(github.event.issue.title, 'Channel suggestion')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append suggested channels to list
        id: append
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';

            // Target list: "gaming" (default), "misc", or "recommended"
            const targetMatch = body.match(/target list:\s*(gaming|misc|recommended)/i);
            const target = targetMatch ? targetMatch[1].toLowerCase() : 'gaming';
            const fileByTarget = {
              gaming: 'lists/gaming-channels.txt',
              misc: 'lists/misc-channels.txt',
              recommended: 'lists/recommended-channels.txt'
            };
            const file = fileByTarget[target];

            // Channel lines look like "- Name | handle" or "- Name".
            // Prefer the handle (stable across renames) when present.
            const entries = [];
            for (const line of body.split('\n')) {
              const m = line.match(/^-\s+(.+?)(?:\s*\|\s*(\S+))?\s*$/);
              if (!m) continue;
              const entry = (m[2] || m[1]).trim().replace(/^@/, '');
              // Plain channel names/handles only - no comment chars or paths
              if (entry && entry.length <= 100 && !/[#<>\\\/]/.test(entry)) {
                entries.push(entry);
              }
            }

            if (entries.length === 0) {
              core.setOutput('added', '0');
              core.setOutput('summary', 'No valid channel lines found in the issue body.');
              return;
            }

            // Comments stay as a header block; entries are sorted A-Z below it
            const content = fs.readFileSync(file, 'utf8');
            const comments = [];
            const entryMap = new Map(); // lowercase -> original casing
            for (const line of content.split('\n')) {
              const t = line.trim();
              if (!t) continue;
              if (t.startsWith('#')) { comments.push(t); continue; }
              if (!entryMap.has(t.toLowerCase())) entryMap.set(t.toLowerCase(), t);
            }

            const fresh = [];
            for (const e of entries) {
              if (!entryMap.has(e.toLowerCase())) {
                fresh.push(e);
                entryMap.set(e.toLowerCase(), e);
              }
            }

            if (fresh.length > 0) {
              const sorted = [...entryMap.values()]
                .sort((a, b) => a.localeCompare(b, 'en', { sensitivity: 'base' }));
              const header = comments.map(c =>
                c.replace(/(#\s*Total channels:\s*)\d+/i, `$1${sorted.length}`));
              fs.writeFileSync(file,
                header.join('\n') + (header.length ? '\n\n' : '') + sorted.join('\n') + '\n');
            }

            const skipped = entries.length - fresh.length;
            core.setOutput('added', String(fresh.length));
            core.setOutput('file', file);
            core.setOutput('summary',
              `Added ${fresh.length} channel(s) to \`${file}\`` +
              (skipped > 0 ? ` (${skipped} already on the list)` : '') + '.');

      - name: Commit and push
        if: steps.append.outputs.added != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/
          git commit -m "chore(lists): add ${{ steps.append.outputs.added }} suggested channel(s) (closes #${{ github.event.issue.number }})"
          git pull --rebase origin main
          git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.append.outputs.summary }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.SUMMARY + ' Lists update in the extension within a few minutes. Thanks for the suggestion!'
            });
            // The push commit's "closes #N" usually closes the issue already;
            // only close explicitly if it is somehow still open (e.g. nothing
            // was committed because every channel was a duplicate).
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });
            if (issue.state === 'open') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed'
              });
            }
